<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>YAMA Uçuş Asistanı</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #0b1f33;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
    }

    .header p {
      margin-top: 8px;
      color: #5f6f7f;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .tabs button {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      background: #e6e9ee;
      color: #0b1f33;
    }

    .tabs button.active {
      background: #0057b8;
      color: white;
    }

    .info-box, .card, .table-card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 22px;
    }

    .recommendation {
      border-left: 7px solid #15a34a;
    }

    .recommendation h2 {
      margin-top: 0;
    }

    .big-time {
      font-size: 30px;
      font-weight: bold;
      margin: 12px 0;
    }

    .buy-btn {
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th {
      background: #eef2f6;
      text-align: left;
      padding: 12px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .note {
      font-size: 13px;
      color: #5f6f7f;
      margin-top: 15px;
    }

    .small {
      color: #5f6f7f;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>✈️ YAMA Uçuş Asistanı</h1>
    <p>Münih (MUC) → Ordu-Giresun (OGU)</p>
  </div>

  <div class="tabs">
    <button id="todayBtn" class="active" onclick="showFlights('today')">BUGÜN</button>
    <button id="tomorrowBtn" onclick="showFlights('tomorrow')">YARIN</button>
  </div>

  <div id="message" class="info-box"></div>

  <div id="recommendation" class="card recommendation"></div>

  <div id="flightList" class="table-card"></div>

</div>

<script>
const API_KEY = "a1a8c488-b22d-452f-81f7-dc5aa247a14f";

const airlineLinks = {
  "THY": "https://www.turkishairlines.com/tr-int/ucak-bileti/rezervasyon/availability-international/",
  "AJet": "https://ajet.com/tr",
  "Pegasus": "https://www.flypgs.com/"
};

const sampleFlights = {
  today: [
    {
      dep: "22:05",
      hub: "23:45 / 07:05 IST",
      arr: "08:45 +1",
      wait: "7:20",
      duration: "10:40",
      price: "227€",
      airline: "THY"
    }
  ],

  tomorrow: [
    {
      dep: "07:15",
      hub: "10:05 / 12:15 IST",
      arr: "13:55",
      wait: "2:10",
      duration: "5:40",
      price: "227€",
      airline: "THY"
    },
    {
      dep: "10:45",
      hub: "14:25 / 18:20 IST",
      arr: "20:00",
      wait: "3:55",
      duration: "8:15",
      price: "227€",
      airline: "THY"
    },
    {
      dep: "12:55",
      hub: "16:10 / 18:20 SAW",
      arr: "20:25",
      wait: "2:10",
      duration: "6:30",
      price: "116,91€",
      airline: "AJet"
    },
    {
      dep: "12:55",
      hub: "16:35 / 18:20 IST",
      arr: "20:00",
      wait: "1:45",
      duration: "6:05",
      price: "227€",
      airline: "THY"
    },
    {
      dep: "19:40",
      hub: "23:15 / 08:20 IST",
      arr: "10:05 +1",
      wait: "9:05",
      duration: "13:25",
      price: "200€",
      airline: "THY"
    }
  ]
};

function showFlights(day) {
  const flights = sampleFlights[day];

  document.getElementById("todayBtn").classList.remove("active");
  document.getElementById("tomorrowBtn").classList.remove("active");

  if (day === "today") {
    document.getElementById("todayBtn").classList.add("active");
    document.getElementById("message").innerHTML =
      "Bugün: Şimdilik örnek uçuşlar gösteriliyor.";
  } else {
    document.getElementById("tomorrowBtn").classList.add("active");
    document.getElementById("message").innerHTML =
      "Yarın: Yarınki tüm örnek uçuşlar gösteriliyor.";
  }

  const recommended = flights[0];

  document.getElementById("recommendation").innerHTML = `
    <h2>🏅 Tavsiye Edilen Uçuş</h2>
    <div class="big-time">${recommended.dep} → ${recommended.arr}</div>
    <div class="small">${recommended.airline} · ${recommended.hub}</div>
    <p>
      <strong>Bekleme:</strong> ${recommended.wait} ·
      <strong>Süre:</strong> ${recommended.duration} ·
      <strong>Fiyat:</strong> ${recommended.price}
    </p>
    <button class="buy-btn" onclick="openAirline('${recommended.airline}')">
      Bileti Satın Al
    </button>
  `;

  let tableRows = "";

  flights.forEach(flight => {
    tableRows += `
      <tr>
        <td>${flight.dep}</td>
        <td>${flight.hub}</td>
        <td>${flight.arr}</td>
        <td>${flight.wait}</td>
        <td>${flight.duration}</td>
        <td>${flight.price}</td>
        <td>${flight.airline}</td>
        <td>
          <button class="buy-btn" onclick="openAirline('${flight.airline}')">
            Al
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("flightList").innerHTML = `
    <h2>${day === "today" ? "Bugünkü Kalan Uçuşlar" : "Yarınki Uçuşlar"}</h2>
    <table>
      <thead>
        <tr>
          <th>MUC</th>
          <th>Hub</th>
          <th>OGU</th>
          <th>Bekleme</th>
          <th>Süre</th>
          <th>€</th>
          <th>Firma</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>
    <div class="note">
      Not: Saat ve fiyatlar şimdilik örnek/veri girişi amaçlıdır. Gerçek sürümde canlı veri bağlanacaktır.
    </div>
  `;
}

function openAirline(airline) {
  const url = airlineLinks[airline];

  if (url) {
    window.open(url, "_blank");
  } else {
    alert("Bu havayolu için bağlantı bulunamadı.");
  }
}

async function testAirLabs() {
  try {
    const response = await fetch(
      `https://airlabs.co/api/v9/schedules?dep_iata=MUC&api_key=${API_KEY}`
    );

    const data = await response.json();

    console.log("AIRLABS TEST:");
    console.log(data);

  } catch (error) {
    console.error("API HATASI:", error);
  }
}

testAirLabs();
showFlights("today");
</script>

</body>
</html>
