<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMA Uçuş Asistanı</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#f4f7fb;
  color:#1f2937;
}
.container{
  max-width:950px;
  margin:auto;
}
h1{
  text-align:center;
  margin-bottom:5px;
}
.subtitle{
  text-align:center;
  color:#6b7280;
  margin-bottom:20px;
}
.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}
button{
  padding:12px 22px;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}
.active{
  background:#005bbb;
  color:white;
}
.inactive{
  background:#e5e7eb;
}
.card{
  background:white;
  padding:18px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}
.recommend{
  border-left:7px solid #16a34a;
}
.bigtime{
  font-size:30px;
  font-weight:bold;
  margin:8px 0;
}
.meta{
  color:#4b5563;
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}
th,td{
  padding:12px;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
}
th{
  background:#f1f5f9;
}
.buy{
  background:#16a34a;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
}
.warning{
  color:#b45309;
  font-weight:bold;
}
.small{
  font-size:13px;
  color:#6b7280;
}
@media(max-width:700px){
  table, thead, tbody, th, td, tr{
    display:block;
  }
  th{
    display:none;
  }
  tr{
    margin-bottom:14px;
    background:white;
    border-radius:12px;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  td{
    border:none;
    text-align:left;
    padding:7px;
  }
  td::before{
    font-weight:bold;
    display:inline-block;
    width:90px;
  }
  td:nth-child(1)::before{content:"Kalkış:";}
  td:nth-child(2)::before{content:"Varış:";}
  td:nth-child(3)::before{content:"Firma:";}
  td:nth-child(4)::before{content:"Aktarma:";}
  td:nth-child(5)::before{content:"Süre:";}
  td:nth-child(6)::before{content:"Fiyat:";}
  td:nth-child(7)::before{content:"İşlem:";}
}
</style>
</head>

<body>

<div class="container">

<h1>✈️ YAMA Uçuş Asistanı</h1>
<div class="subtitle">Münih (MUC) → Ordu-Giresun (OGU)</div>

<div class="buttons">
  <button id="todayBtn" class="active" onclick="showFlights('today')">BUGÜN</button>
  <button id="tomorrowBtn" class="inactive" onclick="showFlights('tomorrow')">YARIN</button>
</div>

<div id="status" class="card small"></div>
<div id="recommendation"></div>
<div id="flightTable"></div>

</div>

<script>
const airlineLinks = {
  "THY": "https://www.turkishairlines.com/tr-int/ucak-bileti/rezervasyon/availability-international/",
  "AJet": "https://ajet.com/tr",
  "Pegasus": "https://www.flypgs.com/"
};

const flights = {
  today: [
    {dep:"07:15", arr:"13:55", airline:"THY", transfer:"IST", duration:"5s 40d", price:"227€", score:95},
    {dep:"10:45", arr:"20:00", airline:"THY", transfer:"IST", duration:"8s 15d", price:"227€", score:78},
    {dep:"12:55", arr:"20:25", airline:"AJet", transfer:"SAW", duration:"6s 30d", price:"116,91€", score:92},
    {dep:"12:55", arr:"20:00", airline:"THY", transfer:"IST", duration:"6s 05d", price:"227€", score:88},
    {dep:"19:40", arr:"10:05 +1", airline:"THY", transfer:"IST", duration:"13s 25d", price:"200€", score:60}
  ],
  tomorrow: [
    {dep:"07:15", arr:"13:55", airline:"THY", transfer:"IST", duration:"5s 40d", price:"227€", score:95},
    {dep:"10:45", arr:"20:00", airline:"THY", transfer:"IST", duration:"8s 15d", price:"227€", score:78},
    {dep:"12:55", arr:"20:25", airline:"AJet", transfer:"SAW", duration:"6s 30d", price:"116,91€", score:92},
    {dep:"12:55", arr:"20:00", airline:"THY", transfer:"IST", duration:"6s 05d", price:"227€", score:88},
    {dep:"19:40", arr:"10:05 +1", airline:"THY", transfer:"IST", duration:"13s 25d", price:"200€", score:60}
  ]
};

function timeToMinutes(t){
  const clean = t.split(" ")[0];
  const parts = clean.split(":");
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function getCurrentMinutes(){
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function showFlights(day){
  document.getElementById("todayBtn").className = day === "today" ? "active" : "inactive";
  document.getElementById("tomorrowBtn").className = day === "tomorrow" ? "active" : "inactive";

  let list = flights[day];

  if(day === "today"){
    const nowMinutes = getCurrentMinutes();
    list = list.filter(f => timeToMinutes(f.dep) > nowMinutes);
  }

  list.sort((a,b) => timeToMinutes(a.dep) - timeToMinutes(b.dep));

  const now = new Date();
  document.getElementById("status").innerHTML =
    day === "today"
    ? `<strong>Bugün:</strong> Şu andan itibaren kalan uçuşlar gösteriliyor. Güncel saat: ${now.getHours().toString().padStart(2,"0")}:${now.getMinutes().toString().padStart(2,"0")}`
    : `<strong>Yarın:</strong> Yarınki tüm örnek uçuşlar gösteriliyor.`;

  if(list.length === 0){
    document.getElementById("recommendation").innerHTML =
      `<div class="card"><h2>Bugün için kalan uçuş görünmüyor.</h2><p>Yarın sekmesini kontrol edebilirsiniz.</p></div>`;
    document.getElementById("flightTable").innerHTML = "";
    return;
  }

  const best = [...list].sort((a,b) => b.score - a.score)[0];

  document.getElementById("recommendation").innerHTML = `
    <div class="card recommend">
      <h2>🥇 Tavsiye Edilen Uçuş</h2>
      <div class="bigtime">${best.dep} → ${best.arr}</div>
      <div class="meta">${best.airline} · ${best.transfer} aktarmalı</div>
      <p><strong>Süre:</strong> ${best.duration} · <strong>Fiyat:</strong> ${best.price}</p>
      <a class="buy" href="${airlineLinks[best.airline]}" target="_blank">Bileti Satın Al</a>
    </div>
  `;

  let rows = list.map(f => `
    <tr>
      <td>${f.dep}</td>
      <td>${f.arr}</td>
      <td>${f.airline}</td>
      <td>${f.transfer}</td>
      <td>${f.duration}</td>
      <td>${f.price}</td>
      <td><a class="buy" href="${airlineLinks[f.airline]}" target="_blank">Satın Al</a></td>
    </tr>
  `).join("");

  document.getElementById("flightTable").innerHTML = `
    <div class="card">
      <h2>${day === "today" ? "Bugünkü Kalan Uçuşlar" : "Yarınki Uçuşlar"}</h2>
      <table>
        <thead>
          <tr>
            <th>Kalkış</th>
            <th>Varış</th>
            <th>Firma</th>
            <th>Aktarma</th>
            <th>Süre</th>
            <th>Fiyat</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <p class="small">Not: Bu sürümde saat ve fiyatlar örnek/veri girişi amaçlıdır. Gerçek sürümde canlı veri bağlanacaktır.</p>
    </div>
  `;
}

showFlights("today");
</script>

</body>
</html>
