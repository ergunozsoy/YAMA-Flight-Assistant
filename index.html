<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>YAMA Uçuş Asistanı</title>
</head>
<body>

  <h1>✈️ YAMA Uçuş Asistanı</h1>
  <p>Münih (MUC) → Ordu-Giresun (OGU)</p>

  <button id="todayBtn" onclick="showFlights('today')">BUGÜN</button>
  <button id="tomorrowBtn" onclick="showFlights('tomorrow')">YARIN</button>

  <div id="message"></div>
  <div id="recommendation"></div>
  <div id="flightList"></div>

<script>
const sampleFlights = {
  today: [{ dep: "22:05", hub: "IST", arr: "08:45 +1", wait: "7:20", duration: "10:40", price: "227€", airline: "THY", yama: 78 }],
  tomorrow: [{ dep: "07:15", hub: "IST", arr: "13:55", wait: "2:10", duration: "5:40", price: "227€", airline: "THY", yama: 95 }]
};

function showFlights(day) {
  const flights = sampleFlights[day];

  document.getElementById("message").innerHTML =
    day === "today" ? "Bugünkü örnek uçuşlar" : "Yarınki örnek uçuşlar";

  const f = flights[0];

  document.getElementById("recommendation").innerHTML = `
    <h2>Tavsiye Edilen Uçuş</h2>
    <p>${f.dep} → ${f.arr}</p>
    <p>${f.airline} / ${f.hub} / YAMA: ${f.yama}</p>
  `;

  document.getElementById("flightList").innerHTML = `
    <h2>Uçuş Listesi</h2>
    <table border="1" cellpadding="8">
      <tr>
        <th>Kalkış</th>
        <th>Hub</th>
        <th>Varış</th>
        <th>Bekleme</th>
        <th>Süre</th>
        <th>Fiyat</th>
        <th>Firma</th>
        <th>YAMA</th>
      </tr>
      <tr>
        <td>${f.dep}</td>
        <td>${f.hub}</td>
        <td>${f.arr}</td>
        <td>${f.wait}</td>
        <td>${f.duration}</td>
        <td>${f.price}</td>
        <td>${f.airline}</td>
        <td>${f.yama}</td>
      </tr>
    </table>
  `;
}

window.onload = function() {
  showFlights("today");
};
</script>

</body>
</html>
